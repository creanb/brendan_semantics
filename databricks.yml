bundle:
  name: retail-semantics

include:
  - resources/*.yml

variables:
  catalog:
    description: "UC catalog created and owned by this bundle."
    default: "retail_semantics_demo"
  bronze_schema:
    description: "Schema for raw synthetic source data."
    default: "bronze"
  gold_schema:
    description: "Schema for the curated star schema and governed metric views (the semantic layer)."
    default: "gold"
  warehouse_name:
    description: "Name of the serverless SQL warehouse this bundle creates and owns."
    default: "retail-semantics-demo-wh"

targets:
  dev:
    default: true
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
