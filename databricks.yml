bundle:
  name: retail-semantics

include:
  - resources/*.yml

variables:
  catalog:
    description: "UC catalog created and owned by this bundle."
    default: "retail_semantics_demo"
  bronze_schema:
    description: "Schema for raw synthetic source data."
    default: "bronze"
  gold_schema:
    description: "Schema for the curated star schema and governed metric views (the semantic layer)."
    default: "gold"
  warehouse_name:
    description: >-
      Name of an EXISTING SQL warehouse to use for all SQL tasks, metric
      views, and the Genie space. Not bundle-owned: Databricks Free Edition
      workspaces are capped at one warehouse, so this bundle looks one up
      by name instead of creating its own. Override this if your
      workspace's default warehouse has a different name.
    default: "Serverless Starter Warehouse"
  warehouse_id:
    description: "Resolved via lookup from warehouse_name — do not override directly."
    lookup:
      warehouse: ${var.warehouse_name}

targets:
  dev:
    default: true
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
