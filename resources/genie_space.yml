# NOTE: src/genie/retail_semantics.geniespace.json currently ships as a
# placeholder ({}). Genie space content isn't expressible from a cold
# start: it must be authored once against real deployed tables/metric
# views, then snapshotted with `databricks bundle generate genie-space`.
# See README.md "Building the Genie space" for the two-pass workflow.
resources:
  genie_spaces:
    retail_semantics:
      title: "Retail Semantic Layer"
      description: >-
        Ask questions about guests, products, stores, transactions, and
        inventory. Prefers governed metric views for defined KPIs and
        falls back to the curated gold tables for exploratory questions.
      warehouse_id: ${resources.sql_warehouses.demo_warehouse.id}
      parent_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/genie
      file_path: ../src/genie/retail_semantics.geniespace.json
      permissions:
        - level: CAN_RUN
          group_name: "users"
