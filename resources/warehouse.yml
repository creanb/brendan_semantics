# Small serverless warehouse created and owned by this bundle so the whole
# project deploys with zero dependency on a pre-existing warehouse in the
# target workspace.
resources:
  sql_warehouses:
    demo_warehouse:
      name: ${var.warehouse_name}
      cluster_size: "2X-Small"
      warehouse_type: PRO
      enable_serverless_compute: true
      auto_stop_mins: 10
      max_num_clusters: 1
